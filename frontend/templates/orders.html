<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Hiralal Kumar Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="orders-page"> <header class="admin-header">
        <h2><i class="fa-solid fa-receipt"></i> My Order History</h2>
        <a href="/" class="admin-nav-link">
            <i class="fa-solid fa-store"></i> Back to Store
        </a>
    </header>

    <div class="admin-container">
        <div id="orders-section" class="admin-box">
            <h3 id="orders-title">Loading your orders...</h3>
            <table id="orders-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Items</th>
                    </tr>
                </thead>
                <tbody id="orders-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="/static/js/orders.js"></script>
</body>
</html>
